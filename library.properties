name=AzureIoT
version=1.2.8
author=Ts. Dr. Mohd Husaini bin Mohd Fauzi <mhusaini@syncmind.my>
maintainer=Ts. Dr. Mohd Husaini bin Mohd Fauzi <mhusaini@syncmind.my>
sentence=Connects an Arduino Uno WiFi Rev2 or an ESP32 board to Azure IoT Central: WiFi, on-device DPS provisioning, MQTT telemetry, and cloud-to-device control.
paragraph=Replaces firedog1024/arduino-uno-wifi-iotc + the archived Azure/dps-keygen tool. No PC-side tooling required -- the board provisions itself via Azure's Device Provisioning Service at boot. Includes writable-property support for controlling actuators (LEDs, buzzers) from the IoT Central dashboard, and reading another device's telemetry via the IoT Central REST API. See the 22 included examples, ordered easiest to hardest.
category=Communication
url=https://github.com/vedacool/Arduino-Azure-IoT-Central
architectures=megaavr,esp32
depends=WiFiNINA (>=1.8.13), PubSubClient (>=2.8.0)
includes=AzureIoT.h
